function gBM(y,m){return DB.bm.find(x=>x.y===y&&x.m===m)}
function gOBM(y,m){let d=gBM(y,m);if(!d){d=defBM(y,m);
  // Copy charges from most recent previous month
  const prev=[...DB.bm].filter(x=>(x.y*12+x.m)<(y*12+m)).sort((a,b)=>(b.y*12+b.m)-(a.y*12+a.m));
  if(prev.length&&prev[0].ch&&prev[0].ch.length){d.ch=JSON.parse(JSON.stringify(prev[0].ch))}
  DB.bm.push(d);save()}return d}
function gIM(y,m){return DB.im.find(x=>x.y===y&&x.m===m)}
function gOIM(y,m){let d=gIM(y,m);if(!d){d=defIM(y,m);
  // Copy contribs and support structure from most recent previous month
  const prev=[...DB.im].filter(x=>(x.y*12+x.m)<(y*12+m)).sort((a,b)=>(b.y*12+b.m)-(a.y*12+a.m));
  if(prev.length){
    if(prev[0].contribs&&prev[0].contribs.length){d.contribs=JSON.parse(JSON.stringify(prev[0].contribs))}
    if(prev[0].supports&&prev[0].supports.length){d.supports=prev[0].supports.map(s=>({n:s.n,v:0,det:s.det.map(dd=>({l:dd.l,v:0,cible:dd.cible||0,img:null}))}))}
  }
  DB.im.push(d);save()}return d}
function sBM(){return[...DB.bm].sort((a,b)=>(a.y*12+a.m)-(b.y*12+b.m))}
function sIM(){return[...DB.im].sort((a,b)=>(a.y*12+a.m)-(b.y*12+b.m))}
function invT4M(y,m){const im=gIM(y,m);return im?im.contribs.reduce((s,c)=>s+c.v,0):0}
function supT(im){return im.supports.reduce((s,p)=>s+p.v,0)}
function amundiT(im){return im.supports.filter(s=>s.n.toLowerCase().includes('pee')||s.n.toLowerCase().includes('perco')||(s.n.toLowerCase().includes('per')&&s.n.toLowerCase().includes('amundi'))).reduce((s,p)=>s+p.v,0)}
function calcPatri(bm,im){const compte=bm?bm.sav*1000:0;const amundi=im?amundiT(im):0;return compte+amundi}
// Navigate only existing months
function prevBM(y,m){const s=sBM();const c=y*12+m;const p=s.filter(d=>(d.y*12+d.m)<c);return p.length?p[p.length-1]:null}
function nextBM(y,m){const s=sBM();const c=y*12+m;const n=s.filter(d=>(d.y*12+d.m)>c);return n.length?n[0]:null}
function prevIM(y,m){const s=sIM();const c=y*12+m;const p=s.filter(d=>(d.y*12+d.m)<c);return p.length?p[p.length-1]:null}
function nextIM(y,m){const s=sIM();const c=y*12+m;const n=s.filter(d=>(d.y*12+d.m)>c);return n.length?n[0]:null}

function bulkDelBM(){const msg='Supprimer les mois AVANT quel mois ?\n(format: 12/2025)\nOu tapez "apres 04/2026" pour supprimer après.';
  const r=prompt(msg);if(!r)return;
  const after=r.toLowerCase().startsWith('apr');const parts=r.replace(/[^0-9/]/g,'').split('/');
  if(parts.length!==2)return alert('Format: MM/YYYY');
  const pm=+parts[0],py=+parts[1];if(!pm||!py)return;
  const pivot=py*12+pm;
  if(after){DB.bm=DB.bm.filter(d=>(d.y*12+d.m)<=pivot)}else{DB.bm=DB.bm.filter(d=>(d.y*12+d.m)>=pivot)}

function rIC(){const raw=sIM().filter(d=>(d.y*12+d.m)>=(iCf.fy*12+iCf.fm)&&(d.y*12+d.m)<=(iCf.ty*12+iCf.tm));if(!raw.length)return;

}

function rDC(){
  const allB=sBM();const allI=sIM();
  const fB=allB.filter(d=>(d.y*12+d.m)>=(dF.fy*12+dF.fm)&&(d.y*12+d.m)<=(dF.ty*12+dF.tm));
  const fI=allI.filter(d=>(d.y*12+d.m)>=(dF.fy*12+dF.fm)&&(d.y*12+d.m)<=(dF.ty*12+dF.tm));
  const lB=fB.map(d=>mLbl(d.y,d.m));const lI=fI.map(d=>mLbl(d.y,d.m));
  const o={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:5}}},y:{grid:{color:'#1e2d4a33'},ticks:{font:{size:5}}}}};

  mkC('ch-di',{type:'bar',data:{labels:lI,datasets:[{data:fI.map(d=>d.contribs.reduce((s,c)=>s+c.v,0)),backgroundColor:'#8b5cf6',borderRadius:2}]},options:o});

  // Gain/perte patrimoine
  const patriS=fB.map(d=>{const im=fI.find(x=>x.y===d.y&&x.m===d.m);return calcPatri(d,im)});
  const gp=patriS.map((p,i)=>i>0?((p-patriS[i-1])/1000):0);
  mkC('ch-dp',{type:'bar',data:{labels:lB,datasets:[{data:gp,backgroundColor:gp.map(d=>d>=0?'#10b981':'#ef4444'),borderRadius:2}]},options:o});

  // Δ Compte
  const dc=fB.map((d,i)=>i>0?(d.sav-fB[i-1].sav):0);
  mkC('ch-dc',{type:'bar',data:{labels:lB,datasets:[{data:dc,backgroundColor:dc.map(d=>d>=0?'#06b6d4':'#ef4444'),borderRadius:2}]},options:o});

  // PEE + PER AMUNDI
  const peeD=fI.map(d=>{const am=d.supports.filter(s=>s.n.toLowerCase().includes('pee')||s.n.toLowerCase().includes('perco')||(s.n.toLowerCase().includes('per')&&s.n.toLowerCase().includes('amundi')));return am.reduce((s,a)=>s+a.v,0)/1000});
  mkC('ch-dpee',{type:'line',data:{labels:lI,datasets:[{data:peeD,borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.1)',fill:true,tension:.3,pointRadius:2}]},options:o});
}

// ===== NOTES =====
function rN(){document.getElementById('t4').innerHTML='<div class="cd"><div class="ch"><div class="b" style="background:var(--gr)"></div>📝 Notes</div><div class="cb"><textarea class="nota" onchange="DB.gn=this.value;save()">'+DB.gn+'</textarea></div></div>'}

// ===== CONFIG =====
// Series registry for graph builder
function getSeriesReg(){
  const allB=sBM(),allI=sIM(),labels=allB.map(d=>mLbl(d.y,d.m));
  const reg=[
    {id:'sav',name:'Compte avant sal. (k€)',data:allB.map(d=>d.sav),src:'Budget'},
    {id:'sap',name:'Compte après sal. (k€)',data:allB.map(d=>d.sap),src:'Budget'},
    {id:'charges',name:'Charges totales (€)',data:allB.map(d=>d.ch.reduce((s,c)=>s+c.v,0)),src:'Budget'},
    {id:'invest',name:'Versements invest (€)',data:allB.map(d=>invT4M(d.y,d.m)),src:'Budget→Invest'},
    {id:'livretNet',name:'Livret A net (€)',data:allB.map(d=>d.lv-d.lr.reduce((s,r)=>s+r.v,0)),src:'Budget'},
    {id:'patri',name:'Patrimoine (k€)',data:allB.map(d=>{const im=gIM(d.y,d.m);return calcPatri(d,im)/1000}),src:'Calculé'},
    {id:'gain',name:'Gain/Perte patrimoine (k€)',data:allB.map((d,i)=>{if(i===0)return 0;const im=gIM(d.y,d.m);const p=allB[i-1];const imp=gIM(p.y,p.m);return(calcPatri(d,im)-calcPatri(p,imp))/1000}),src:'Calculé'},
    {id:'deltaC',name:'Δ Compte (k€)',data:allB.map((d,i)=>i>0?(d.sav-allB[i-1].sav):0),src:'Calculé'},
  ];
  // Add each invest support dynamically
  const supNames=[...new Set(allI.flatMap(m=>m.supports.map(s=>s.n)))];
  supNames.forEach(n=>{reg.push({id:'sup_'+n.replace(/\s/g,'_'),name:n+' (€)',data:allB.map(d=>{const im=gIM(d.y,d.m);if(!im)return 0;const s=im.supports.find(x=>x.n===n);return s?s.v:0}),src:'Invest'})});
  return{labels,series:reg}}

function rCfg(){
  if(!DB.customCharts)DB.customCharts=[];
  const reg=getSeriesReg();

  document.getElementById('t5').innerHTML=`
    <div class="cd"><div class="ch"><div class="b" style="background:var(--bl)"></div>📖 Variables brutes</div><div class="cb">
      <div style="font-size:6px;color:var(--tm);margin-bottom:3px">Variables disponibles pour les indicateurs et graphes. Se met à jour quand vous ajoutez un support.</div>
      <table><thead><tr><th>ID</th><th>Nom</th><th>Source</th><th>Valeur</th></tr></thead>
      <tbody>${reg.series.map(s=>'<tr><td class="mono" style="color:var(--pr);font-size:6px">'+s.id+'</td><td style="font-weight:500">'+s.name+'</td><td><span class="tag">'+s.src+'</span></td><td class="mono" style="color:var(--bl)">'+(s.data.length?f$(Math.round(s.data[s.data.length-1]*100)/100):'—')+'</td></tr>').join('')}</tbody></table>
    </div></div>

    <div class="cd"><div class="ch"><div class="b" style="background:var(--pr)"></div>📐 Indicateurs calculés</div><div class="cb">
      <div style="font-size:6px;color:var(--tm);margin-bottom:3px">Ajoutez, modifiez ou supprimez des indicateurs. Utilisez les IDs ci-dessus dans les formules.</div>
      ${DB.kpis.map((k,i)=>'<div style="background:var(--c2);border-radius:4px;padding:4px;border:1px solid var(--bd);margin-bottom:3px">'+
        '<div class="ir"><span style="font-size:5px;color:var(--td);width:30px">Label</span><input class="inp is" style="font-size:7px" value="'+k.label+'" onchange="DB.kpis['+i+'].label=this.value;save()"><span style="cursor:pointer;color:var(--rd);font-size:8px" onclick="DB.kpis.splice('+i+',1);save();rCfg()">×</span></div>'+
        '<div class="ir"><span style="font-size:5px;color:var(--td);width:30px">Form.</span><input class="inp is mono" style="font-size:6px" value="'+k.formula+'" onchange="DB.kpis['+i+'].formula=this.value;save()"></div>'+
        '<div class="ir"><span style="font-size:5px;color:var(--td);width:30px">Desc.</span><input class="inp is" style="font-size:6px" value="'+k.desc+'" onchange="DB.kpis['+i+'].desc=this.value;save()"></div>'+
      '</div>').join('')}
      <button class="btn bs" style="width:100%;font-size:7px" onclick="DB.kpis.push({id:'c'+Date.now(),label:'Nouvel indicateur',formula:'À définir',desc:'Description'});save();rCfg()">+ Ajouter indicateur</button>
    </div></div>

    <div class="cd"><div class="ch"><div class="b" style="background:var(--am)"></div>📊 Constructeur de graphes</div><div class="cb">
      <div style="font-size:6px;color:var(--tm);margin-bottom:3px">Créez des graphes personnalisés. Les variables se mettent à jour automatiquement.</div>
      ${DB.customCharts.map((gc,gi)=>'<div style="background:var(--c2);border-radius:5px;padding:5px;border:1px solid var(--bd);margin-bottom:5px">'+
        '<div class="ir"><input class="inp is" style="font-weight:600" value="'+gc.title+'" onchange="DB.customCharts['+gi+'].title=this.value;save();rCfg()"><span style="cursor:pointer;color:var(--rd);font-size:10px" onclick="DB.customCharts.splice('+gi+',1);save();rCfg()">×</span></div>'+
        '<div class="ir"><span style="font-size:6px;color:var(--td);width:30px">Type</span><select class="inp is" style="font-size:7px" onchange="DB.customCharts['+gi+'].type=this.value;save();rCfg()">'+['line','bar','doughnut'].map(t=>'<option'+(t===gc.type?' selected':'')+'>'+t+'</option>').join('')+'</select></div>'+
        '<div style="font-size:6px;color:var(--td);margin:2px 0">Séries (cliquer pour ajouter/retirer) :</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:3px">'+reg.series.map(s=>{const sel=gc.seriesIds.includes(s.id);return'<span style="font-size:6px;padding:2px 4px;border-radius:3px;cursor:pointer;border:1px solid '+(sel?'var(--bl)':'var(--bd)')+';background:'+(sel?'rgba(59,130,246,.15)':'var(--bg)')+';color:'+(sel?'var(--bl)':'var(--td)')+'" onclick="togChSeries('+gi+',\''+s.id+'\')">'+s.name.split('(')[0].trim()+'</span>'}).join('')+'</div>'+
        '<div class="cc ccs"><canvas id="cc-'+gi+'"></canvas></div>'+
      '</div>').join('')}
      <button class="btn bp" style="width:100%;font-size:7px" onclick="DB.customCharts.push({title:'Nouveau graphe',type:'line',seriesIds:['sav']});save();rCfg()">+ Ajouter un graphe</button>
    </div></div>

    <div class="cd"><div class="ch"><div class="b" style="background:var(--rd)"></div>🔧 Données</div><div class="cb">
      <button class="btn bs" style="width:100%;margin-bottom:3px" onclick="if(confirm('Réinitialiser ?')){DB=defDB();save();location.reload()}">🗑️ Reset</button>
      <div style="font-size:5px;color:var(--td)">PIN: ${DB.pin} • Clé: hft7 • Firebase: ${fdb?'☁️':'📴'}</div>
    </div></div>`;

  // Render custom charts
  setTimeout(()=>{
    if(!DB.customCharts)return;
    DB.customCharts.forEach((gc,gi)=>{
      const cEl=document.getElementById('cc-'+gi);if(!cEl)return;
      const selSeries=reg.series.filter(s=>gc.seriesIds.includes(s.id));
      if(!selSeries.length)return;
      const isDoughnut=gc.type==='doughnut';
      const cfg=isDoughnut?
        {type:'doughnut',data:{labels:selSeries.map(s=>s.name.split('(')[0].trim()),datasets:[{data:selSeries.map(s=>s.data.length?s.data[s.data.length-1]:0),backgroundColor:COLORS.slice(0,selSeries.length),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'50%',plugins:{legend:{position:'bottom',labels:{boxWidth:6,font:{size:5}}}}}}:
        {type:gc.type,data:{labels:reg.labels,datasets:selSeries.map((s,i)=>({label:s.name.split('(')[0].trim(),data:s.data,borderColor:COLORS[i%COLORS.length],backgroundColor:gc.type==='bar'?COLORS[i%COLORS.length]:'transparent',tension:.3,pointRadius:2,borderWidth:2,borderRadius:gc.type==='bar'?2:0}))},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:6,font:{size:5}}}},scales:{x:{grid:{display:false},ticks:{font:{size:5}}},y:{grid:{color:'#1e2d4a33'},ticks:{font:{size:5}}}}}};
      mkC('cc-'+gi,cfg)})},100);
}

function togChSeries(gi,sid){
  const gc=DB.customCharts[gi];const idx=gc.seriesIds.indexOf(sid);
  if(idx>=0)gc.seriesIds.splice(idx,1);else gc.seriesIds.push(sid);
  save();rCfg()}

initPin();
</script>
